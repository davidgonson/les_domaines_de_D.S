<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f1;font-size:14px;min-height:100vh}
.app{max-width:920px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 0 14px;border-bottom:1px solid #e5e3de;margin-bottom:14px}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.ba{background:#FBEAF0;color:#72243E}.bp{background:#E1F5EE;color:#085041}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d5d3ce;font-size:12px;cursor:pointer;font-family:inherit;background:#fff;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f0eeea}
.btn-primary{background:#993556;color:#fff;border-color:#993556}.btn-primary:hover{background:#72243E;border-color:#72243E}
.btn-resa{background:#3C2A6B;color:#fff;border-color:#3C2A6B}.btn-resa:hover{background:#2C1F4F;border-color:#2C1F4F}
.btn-visite{background:#FCE9F0;color:#A32D5C;border-color:#F5C7DA}.btn-visite:hover{background:#F8D9E6}
.btn-prestation{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}.btn-prestation:hover{background:#D8EAF8}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}
.btn-danger{color:#A32D2D;border-color:#F7C1C1;background:#fff}.btn-danger:hover{background:#FCEBEB}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#ebe9e4;border-radius:8px;padding:3px}
.dom-picker{display:flex;gap:8px}
.dom-box{flex:1;text-align:center;padding:12px 6px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;user-select:none}
.dom-box.sel{opacity:1;box-shadow:0 0 0 2px rgba(0,0,0,.3) inset}
.dom-box.fade{opacity:.3}
.tab{flex:1;padding:6px 2px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;border:none;background:transparent;color:#666;font-family:inherit;transition:background .15s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0}
.tab .tab-ic{font-size:14px;line-height:1}
.tab .tab-lbl{font-weight:500;text-transform:uppercase;font-size:9.5px;letter-spacing:.03em;line-height:1.1}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;border:1px solid #d5d3ce}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #d5d3ce;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#993556;box-shadow:0 0 0 3px rgba(153,53,86,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.pay-inline{border:1px solid transparent;background:transparent;font:inherit;color:inherit;padding:2px 4px;font-size:12.5px;border-radius:4px}
.pay-inline:hover{border-color:#ddd}
.pay-inline:focus{background:#fff;border-color:#999;outline:none}
.g2-compact{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g2-compact .field{gap:2px}
.g2-compact .field label{font-size:10.5px}
.g2-compact .field input,.g2-compact .field select{font-size:12px;padding:6px 7px}
.field label{font-size:11px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:.03em}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.p0{background:#FBEAF0;color:#72243E}.p1{background:#FFF8E6;color:#7A5800}.p2{background:#EAF3DE;color:#27500A}.p3{background:#EEEDFE;color:#3C3489}.p4{background:#E6F1FB;color:#0C447C}
.status{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.s-confirmé{background:#EAF3DE;color:#27500A}.s-option{background:#FAEEDA;color:#633806}.s-annulé{background:#FCEBEB;color:#791F1F}
.pay-full{background:#EAF3DE;color:#27500A;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.pay-part{background:#FAEEDA;color:#633806;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.pay-none{background:#FCEBEB;color:#791F1F;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-ok{background:#EAF3DE;color:#27500A}.alert-info{background:#E6F1FB;color:#0C447C}
.metric{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:.85rem;text-align:center}
.metric .val{font-size:20px;font-weight:500;display:block;margin-top:3px}
.metric .lbl{font-size:11px;color:#666}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:96%;max-width:560px;border:1px solid #e5e3de;margin-bottom:40px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.comment-item{border:1px solid #e5e3de;border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:13px}
.comment-item .meta{font-size:11px;color:#666;margin-bottom:4px;display:flex;justify-content:space-between}
.link-box{display:flex;align-items:center;gap:8px;background:#f5f4f1;border-radius:8px;padding:8px 12px;font-size:11px;font-family:monospace;word-break:break-all;border:1px solid #e5e3de}
.wa-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;background:#25D366;color:#fff;font-size:12px;font-weight:500;text-decoration:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:-1rem -1.25rem 12px -1.25rem;padding:10px 1.25rem;background:#9c9890;border-radius:12px 12px 0 0}
.sec-hdr h2{font-size:15px;font-weight:500;color:#fff}
.sec-hdr .btn{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
.sec-hdr .btn:hover{background:rgba(255,255,255,.25)}
.empty{text-align:center;padding:2.5rem;color:#666;font-size:13px}
.note-box{background:#f5f4f1;border-radius:6px;padding:8px 12px;font-size:12px;color:#555;border-left:3px solid #ED93B1;margin-top:6px}
.ev-card{border:1px solid #e5e3de;border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff}
.list-tbl{width:100%;border-collapse:collapse;font-size:13px}
.list-tbl th{text-align:left;padding:7px 9px;font-size:11px;font-weight:700;color:#000;background:#f0eee8;border-bottom:1px solid #e0ddd4;text-transform:uppercase;letter-spacing:.03em}
.list-tbl td{padding:8px 9px;border-bottom:1px solid #e5e3de;vertical-align:middle}
.list-tbl tbody tr:nth-child(even) td{background:#f7f6f3}
.list-tbl tr:last-child td{border-bottom:none}
.list-tbl tr:hover td{background:#faf9f7;cursor:pointer}
.panel-wrap{display:flex;gap:14px;align-items:flex-start}
.cal-side{flex:1;min-width:0}
.detail-panel{width:340px;max-width:92vw;flex-shrink:0;background:#fff;border-left:1px solid #e5e3de;padding:1rem;position:fixed;top:0;right:0;bottom:0;z-index:60;overflow-y:auto;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
.dp-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,18,14,.35);z-index:55}
.dp-section{border-top:1px solid #e5e3de;padding-top:10px;margin-top:10px}
.dp-section label{font-size:10px;color:#666;font-weight:500;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}

/* LOGIN */
.login-wrap{max-width:360px;margin:4rem auto;text-align:center;background:#fff;border-radius:16px;padding:2.5rem;border:1px solid #e5e3de}
.login-wrap .logo{font-size:40px;margin-bottom:16px}
.login-wrap h2{font-size:22px;font-weight:500;margin-bottom:6px}
.login-wrap p{color:#666;font-size:13px;margin:6px 0 24px}
.pin-in{text-align:center;font-size:24px;letter-spacing:8px;font-weight:500}

/* CALENDRIER */
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.cal-header .month-label{font-size:18px;font-weight:500;flex:1;text-align:center}
.cal-nav{padding:6px 12px;border-radius:8px;border:1px solid #d5d3ce;cursor:pointer;background:#fff;font-size:18px;color:#1a1a1a;line-height:1}
.cal-nav:hover{background:#f0eeea}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-radius:10px;overflow:hidden;border:1px solid #d5d3ce;background:#fff;position:relative}
.cal-dow{background:#f0eeea;text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;border-right:1px solid #d5d3ce;border-bottom:1px solid #d5d3ce}
.cal-dow:nth-child(7n){border-right:none}
.cal-cell{background:#fff;min-height:120px;position:relative;cursor:pointer;padding:4px 4px 4px;border-right:1px solid #e5e3de;border-bottom:1px solid #e5e3de}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#faf9f7}
.cal-cell.other{background:#f8f7f4;opacity:.75}
.cal-cell.today{outline:2px solid #993556;outline-offset:-2px;z-index:1}
.cal-cell.vac-mid{background:#F3F0FF}
.cal-cell.vac-mid.other{background:#EEE9F8}
.cal-cell.vac-edge{background:#DDD6F8}
.cal-cell.vac-edge.other{background:#D5CDF0}
.cal-cell.pont{background:#E2DBF3}
.cal-cell.pont.other{background:#DAD2EC}
.cal-cell.ferie{background:#D2C7F0}
.cal-cell.ferie.other{background:#C7BAEA}
.day-num-wrap{display:flex;align-items:baseline;justify-content:space-between;padding:0 2px;margin-bottom:3px}
.day-num{font-size:12px;font-weight:500;color:#666}
.cal-cell.today .day-num{color:#993556;font-weight:700}
.cal-cell.other .day-num{color:#bbb}
.cal-cell.vac-edge .day-num,.cal-cell.ferie .day-num{color:#3C3489;font-weight:700}
.day-tag{font-size:9px;font-weight:600;color:#534AB7;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;line-height:1.2}
.bands-area{position:absolute;left:0;right:0;top:24px;bottom:2px;pointer-events:none}
.band{position:absolute;height:26px;font-size:9px;font-weight:600;cursor:pointer;pointer-events:all;z-index:2;padding:1px 4px;text-align:left;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:1px;overflow:hidden}
.band .b-top{font-weight:500;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;line-height:13px}
.band .b-bottom{display:flex;justify-content:space-between;font-size:8px;font-weight:700;opacity:.95;line-height:10px}
.band-start{border-radius:5px 0 0 5px}
.band-end{border-radius:0 5px 5px 0}
.band-startend{border-radius:5px;padding:0 5px}
.band-mid{border-radius:0}
.band.option{color:#fff!important}
.band.paid.band-startend.b0f,.band.paid.band-startend.b0l{box-shadow:inset 0 0 0 2px #5C1530}
.band.paid.band-start.b0f,.band.paid.band-start.b0l{box-shadow:inset 2px 0 0 0 #5C1530,inset 0 2px 0 0 #5C1530,inset 0 -2px 0 0 #5C1530}
.band.paid.band-end.b0f,.band.paid.band-end.b0l{box-shadow:inset -2px 0 0 0 #5C1530,inset 0 2px 0 0 #5C1530,inset 0 -2px 0 0 #5C1530}
.band.paid.band-mid.b0f,.band.paid.band-mid.b0l{box-shadow:inset 0 2px 0 0 #5C1530,inset 0 -2px 0 0 #5C1530}
.band.paid.band-startend.b1f,.band.paid.band-startend.b1l{box-shadow:inset 0 0 0 2px #7A5800}
.band.paid.band-start.b1f,.band.paid.band-start.b1l{box-shadow:inset 2px 0 0 0 #7A5800,inset 0 2px 0 0 #7A5800,inset 0 -2px 0 0 #7A5800}
.band.paid.band-end.b1f,.band.paid.band-end.b1l{box-shadow:inset -2px 0 0 0 #7A5800,inset 0 2px 0 0 #7A5800,inset 0 -2px 0 0 #7A5800}
.band.paid.band-mid.b1f,.band.paid.band-mid.b1l{box-shadow:inset 0 2px 0 0 #7A5800,inset 0 -2px 0 0 #7A5800}
.band.paid.band-startend.b2f,.band.paid.band-startend.b2l{box-shadow:inset 0 0 0 2px #1C3A07}
.band.paid.band-start.b2f,.band.paid.band-start.b2l{box-shadow:inset 2px 0 0 0 #1C3A07,inset 0 2px 0 0 #1C3A07,inset 0 -2px 0 0 #1C3A07}
.band.paid.band-end.b2f,.band.paid.band-end.b2l{box-shadow:inset -2px 0 0 0 #1C3A07,inset 0 2px 0 0 #1C3A07,inset 0 -2px 0 0 #1C3A07}
.band.paid.band-mid.b2f,.band.paid.band-mid.b2l{box-shadow:inset 0 2px 0 0 #1C3A07,inset 0 -2px 0 0 #1C3A07}
.band.paid.band-startend.b3f,.band.paid.band-startend.b3l{box-shadow:inset 0 0 0 2px #2A2566}
.band.paid.band-start.b3f,.band.paid.band-start.b3l{box-shadow:inset 2px 0 0 0 #2A2566,inset 0 2px 0 0 #2A2566,inset 0 -2px 0 0 #2A2566}
.band.paid.band-end.b3f,.band.paid.band-end.b3l{box-shadow:inset -2px 0 0 0 #2A2566,inset 0 2px 0 0 #2A2566,inset 0 -2px 0 0 #2A2566}
.band.paid.band-mid.b3f,.band.paid.band-mid.b3l{box-shadow:inset 0 2px 0 0 #2A2566,inset 0 -2px 0 0 #2A2566}
.band.paid.band-startend.b4f,.band.paid.band-startend.b4l{box-shadow:inset 0 0 0 2px #07335C}
.band.paid.band-start.b4f,.band.paid.band-start.b4l{box-shadow:inset 2px 0 0 0 #07335C,inset 0 2px 0 0 #07335C,inset 0 -2px 0 0 #07335C}
.band.paid.band-end.b4f,.band.paid.band-end.b4l{box-shadow:inset -2px 0 0 0 #07335C,inset 0 2px 0 0 #07335C,inset 0 -2px 0 0 #07335C}
.band.paid.band-mid.b4f,.band.paid.band-mid.b4l{box-shadow:inset 0 2px 0 0 #07335C,inset 0 -2px 0 0 #07335C}
.b0f{background:#F4C0D1;color:#72243E}
.b0l{background:#FBEAF0;color:#993556;border:1px dashed #F4C0D1}
.b1f{background:#F5D98B;color:#7A5800}
.b1l{background:#FFF8E6;color:#BA8800;border:1px dashed #F5D98B}
.b2f{background:#C0DD97;color:#27500A}
.b2l{background:#EAF3DE;color:#3B6D11;border:1px dashed #C0DD97}
.b3f{background:#CECBF6;color:#3C3489}
.b3l{background:#EEEDFE;color:#534AB7;border:1px dashed #CECBF6}
.b4f{background:#B5D4F4;color:#0C447C}
.b4l{background:#E6F1FB;color:#185FA5;border:1px dashed #B5D4F4}
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
@media(max-width:640px){
  .detail-panel{width:100%;max-width:100vw}
  .g3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .list-tbl th:nth-child(5),.list-tbl td:nth-child(5){display:none}
  .liste-evt-tbl th:nth-child(5),.liste-evt-tbl td:nth-child(5){display:table-cell}
  .liste-evt-tbl th:nth-child(2),.liste-evt-tbl td:nth-child(2){display:none}
  .liste-evt-tbl th:nth-child(6),.liste-evt-tbl td:nth-child(6){display:none}
}
</style>

<script>
const SK='domnoрm_prod_v1';
const SUPA_URL='https://hdtltrnabrgibkcvubzd.supabase.co';
const SUPA_KEY='sb_publishable_zvpg0YOHegxqXJxbEKhSbQ_3oLwbrr1';
async function fetchRemoteD(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/app_state?id=eq.1&select=data`,{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
    if(!res.ok)return null;
    const json=await res.json();
    if(json&&json[0]&&json[0].data&&Object.keys(json[0].data).length)return json[0].data;
    return null;
  }catch(e){console.error('Supabase fetch a échoué, utilisation des données locales',e);return null;}
}
async function pushRemoteD(d){
  try{
    await fetch(`${SUPA_URL}/rest/v1/app_state?id=eq.1`,{
      method:'PATCH',
      headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({data:d,updated_at:new Date().toISOString()})
    });
  }catch(e){console.error('Supabase push a échoué (données gardées en local seulement)',e);}

function buildDateCellMap(y,m){
  const fd=new Date(y,m,1);let sd=fd.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();

  bands.forEach(b=>{
    const startIdx=b.row*7+b.colStart,endIdx=b.row*7+b.colStart+b.spanCols-1;
    const startCell=cells[startIdx],endCell=cells[endIdx];
    if(!startCell||!endCell)return;
    const sRect=startCell.getBoundingClientRect(),eRect=endCell.getBoundingClientRect();
    const cellW=sRect.width;
    let leftPx,widthPx;
    /* Positionnement proportionnel continu sur la largeur réelle (en pixels) de la grille :
       - la journée visible va de 8h à 22h (14h) — pas d'horaires avant 8h ni après 22h
       - case arrivée : part de hArr, s'étire jusqu'au bord droit de la DERNIÈRE case du segment
       - cases milieu : pleine largeur du segment
       - case départ : part du bord gauche du segment, finit à hDep
       - case unique (startend) : de hArr à hDep dans la même case */
    if(b.shapeClass==='band-startend'){
      leftPx=(sRect.left-gridRect.left)+dayFrac(b.hA)*cellW;
      const rightPx=(eRect.left-gridRect.left)+dayFrac(b.hD)*cellW;
      widthPx=Math.max(rightPx-leftPx,6);
    } else if(b.shapeClass==='band-start'){
      leftPx=(sRect.left-gridRect.left)+dayFrac(b.hA)*cellW;
      widthPx=(eRect.left+eRect.width-gridRect.left)-leftPx;
    } else if(b.shapeClass==='band-end'){
      leftPx=(sRect.left-gridRect.left);
      const rightPx=(eRect.left-gridRect.left)+dayFrac(b.hD)*cellW;
      widthPx=Math.max(rightPx-leftPx,6);
    } else {
      leftPx=(sRect.left-gridRect.left);
      widthPx=(eRect.left+eRect.width-gridRect.left)-leftPx;
    }
    const topPx=(sRect.top-gridRect.top)+24+(b.slot*28);
    const div=document.createElement('div');
    div.className=`band ${b.shapeClass} ${b.bandCls}${b.optCls}${b.isPaid?' paid':''}`;
    div.style.position='absolute';
    div.style.top=topPx+'px';
    div.style.left=leftPx+'px';
    div.style.width=widthPx+'px';
    const timeArrF=fmtHeureCourt(b.timeArr),timeDepF=fmtHeureCourt(b.timeDep);
    let label;
    if(STRIP_BAND_INFO){
      label=(timeArrF||timeDepF)?`<div class="b-bottom" style="justify-content:center;gap:6px;font-size:9px">${timeArrF?`<span>${timeArrF}</span>`:''}${(timeArrF&&timeDepF)?'<span>→</span>':''}${timeDepF?`<span>${timeDepF}</span>`:''}</div>`:'';
    } else {
      const topParts=[];
      if(b.nameTxt){
        const dotHtml=b.isPartPaid?'<span style="font-size:11px;line-height:1;margin-right:2px">●</span>':'';
        topParts.push(dotHtml+'<span style="font-weight:800">'+b.nameTxt+'</span>');
      }
      if(b.mainLine)topParts.push(b.mainLine);
      const topLine=topParts.join(' · ');
      label=(topLine||timeArrF||timeDepF)?`<div class="b-top">${topLine}</div><div class="b-bottom"><span>${timeArrF}</span><span>${timeDepF}</span></div>`:'';
    }
    div.innerHTML=label;
    div.title=label.replace(/<\/(div|span)>/g,' ').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()+' — cliquer pour détail';
    if(!STRIP_BAND_INFO)div.onclick=ev=>{ev.stopPropagation();selectResa(b.rid,ev);};
    else div.style.cursor='default';
    grid.appendChild(div);
    placed.push({rid:b.rid,slot:b.slot,row:b.row,leftPx,widthPx,topPx});
  });
  /* Avertissement de chevauchement : deux réservations différentes, même créneau (slot/ligne), qui se touchent ou se croisent dans le temps */
  const bySlotRow={};
  placed.forEach(p=>{const k=p.row+'_'+p.slot;(bySlotRow[k]=bySlotRow[k]||[]).push(p);});
  Object.values(bySlotRow).forEach(arr=>{
    arr.sort((a,b)=>a.leftPx-b.leftPx);
    for(let i=0;i<arr.length-1;i++){
      const a=arr[i],b2=arr[i+1];
      if(a.rid===b2.rid)continue;
      if(a.leftPx+a.widthPx>b2.leftPx+0.5){
        const warn=document.createElement('div');
        warn.style.position='absolute';
        warn.style.top=(Math.min(a.topPx,b2.topPx))+'px';
        warn.style.left=(b2.leftPx-1.5)+'px';
        warn.style.width='3px';
        warn.style.height='26px';
        warn.style.background='#E11D2A';
        warn.style.zIndex='5';
        warn.style.borderRadius='2px';
        warn.style.boxShadow='0 0 3px rgba(225,29,42,.7)';
        warn.title='⚠️ Chevauchement : ces deux réservations se croisent dans le temps';
        grid.appendChild(warn);
      }
    }
  });
}

function injectVisiteMarkers(){
  const inCalView=(S.view==='admin'&&S.tab==='calendrier')||(S.view==='presta'&&S.prestaTab==='calendrier');
  if(!inCalView)return;
  const grid=document.getElementById('cal-grid-main');if(!grid)return;
  const cells=grid.querySelectorAll('.cal-cell');if(!cells.length)return;
  const{dtc}=buildDateCellMap(S.calYear,S.calMonth);
  const domIdx={};D.domaines.forEach((d,i)=>domIdx[d.id]=i);
  const gridRect=grid.getBoundingClientRect();
  const dayFrac=h=>Math.max(0,Math.min(1,(h-8)/14));
  const dotColors=['#72243E','#F5D98B','#27500A','#3C3489','#0C447C']; /* jaune éclairci à la demande */
  /* Bandes déjà posées par injectBands, pour éviter de superposer une visite sur une réservation */
  const existingBands=Array.from(grid.querySelectorAll('.band')).map(el=>({left:parseFloat(el.style.left),width:parseFloat(el.style.width),top:parseFloat(el.style.top)}));
  D.visites.filter(v=>(!CAL_DOMAIN_FILTER||CAL_DOMAIN_FILTER.includes(v.domaine))&&!(S.hiddenDomains||[]).includes(v.domaine)).forEach(v=>{
    if(!v.date||!dtc[v.date])return;
    const cellInfo=dtc[v.date];const cell=cells[cellInfo.ci];if(!cell)return;
    const slot=domIdx[v.domaine]||0;
    const cRect=cell.getBoundingClientRect();
    const cellLeft=cRect.left-gridRect.left;
    const hh=v.heure?(parseInt(v.heure.split(':')[0])+(parseInt(v.heure.split(':')[1]||0)/60)):15;
    let leftPx=cellLeft+dayFrac(hh)*cRect.width;
    const rowTopPx=(cRect.top-gridRect.top)+24+(slot*28);
    /* Anti-collision : si une bande de réservation occupe déjà cet endroit sur cette ligne, on décale */
    const collide=existingBands.find(b=>Math.abs(b.top-rowTopPx)<4&&leftPx>=b.left-7&&leftPx<=b.left+b.width+7);
    if(collide){
      const proposedRight=collide.left+collide.width+5;
      leftPx=(proposedRight<cellLeft+cRect.width-6)?proposedRight:Math.max(cellLeft+2,collide.left-9);
    }
    const dom=gDom(v.domaine);const c=dom.color||0;
    const cancelled=v.status==='annulée';
    const heureLbl=fmtHeureCourt(v.heure);
    const div=document.createElement('div');
    div.style.position='absolute';div.style.left=Math.max(0,leftPx-5)+'px';div.style.top=(rowTopPx+1)+'px';div.style.zIndex='4';div.style.cursor='pointer';
    div.style.width='12px';div.style.height='28px';
    div.title=`Visite — ${v.client||''} ${v.heure||''}${cancelled?' (annulée)':''}`;
    div.onclick=ev=>{ev.stopPropagation();openM('editVisite',v.id);};
    div.innerHTML=`<div style="width:12px;height:28px;border-radius:6px;background:#fff;border:1.4px solid ${dotColors[c]};display:flex;align-items:center;justify-content:center;overflow:hidden;${cancelled?'opacity:.55':''}">
      <span style="font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;font-size:8.5px;font-weight:600;letter-spacing:.2px;color:${dotColors[c]};transform:rotate(-90deg);white-space:nowrap;${cancelled?'text-decoration:line-through':''}">${heureLbl}</span>
    </div>`;
    grid.appendChild(div);
  });
}

function renderCalendrier(){
  const readOnly=S.view!=='admin';
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const y=S.calYear,m=S.calMonth,todayStr=dstr(new Date());
  const{tc,sd,dim,dip}=buildBands(y,m);
  let gridHtml=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let ci=0;ci<tc;ci++){
    let day,mo=m,yr=y,isO=false;
    if(ci<sd){day=dip-sd+ci+1;mo=m-1;if(mo<0){mo=11;yr=y-1;}isO=true;}
    else if(ci>=sd+dim){day=ci-sd-dim+1;mo=m+1;if(mo>11){mo=0;yr=y+1;}isO=true;}
    else day=ci-sd+1;
    const ds3=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dc=dayCls(ds3),tag=dayTag(ds3);
    let cls='cal-cell';if(isO)cls+=' other';if(ds3===todayStr)cls+=' today';if(dc)cls+=` ${dc}`;
    const cellClick=readOnly?'':` onclick="openDayMenu('${ds3}')"`;
    gridHtml+=`<div class="${cls}"${cellClick}><div class="day-num-wrap"><span class="day-num">${day}</span>${tag?`<span class="day-tag">${tag}</span>`:''}</div><div class="bands-area"></div></div>`;
  }
  const selR=S.selResa?D.reservations.find(x=>x.id===S.selResa):null;
  return`<div class="panel-wrap">
    <div class="cal-side">
      <div class="cal-header">
        ${monthYearPicker('calYear','calMonth')}
        ${readOnly?'':`<div style="display:flex;gap:6px;flex-wrap:wrap">

      </div>
      <div class="cal-grid" id="cal-grid-main">${gridHtml}</div>
      <div style="margin-top:8px;font-size:11px;color:#888">${readOnly?'Clic sur une bande colorée = détail (lecture seule)':'Clic sur une case vide = nouvelle réservation · Clic sur une bande colorée = détail'}</div>

function nightsByMonth(r){
  const as=r.dateArrivee||r.date,ds2=r.dateDepart||r.dateArrivee||r.date;
  const isJ=as===ds2;
  const counts={};
  if(isJ){
    counts[as.slice(0,7)]=1;
  } else {
    let cur=new Date(as+'T12:00:00');const fin=new Date(ds2+'T12:00:00');
    while(cur<fin){const key=dstr(cur).slice(0,7);counts[key]=(counts[key]||0)+1;cur=addDays(cur,1);}
  }
  return counts;
}
function montantForMonth(r,y,m){
  const counts=nightsByMonth(r);
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const key=`${y}-${String(m+1).padStart(2,'0')}`;
  const inMonth=counts[key]||0;
  return(r.montant||0)*(inMonth/total);
}
function paidForMonth(r,y,m){
  const counts=nightsByMonth(r);
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const key=`${y}-${String(m+1).padStart(2,'0')}`;
  const inMonth=counts[key]||0;
  return totPay(r)*(inMonth/total);
}
function montantForYear(r,y){
  const counts=nightsByMonth(r);const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  let inY=0;Object.entries(counts).forEach(([k,n])=>{if(k.startsWith(y+'-'))inY+=n;});
  return(r.montant||0)*(inY/total);
}
function paidForYear(r,y){
  const counts=nightsByMonth(r);const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  let inY=0;Object.entries(counts).forEach(([k,n])=>{if(k.startsWith(y+'-'))inY+=n;});
  return totPay(r)*(inY/total);
}
function renderBilan(){
  const viewMode=S.bilanViewMode||'month';
  const y=S.bilanYear,m=S.bilanMonth;
  const inPeriod=r=>{const d=r.dateArrivee||r.date;if(!d)return false;const[ry,rm]=d.split('-').map(Number);return viewMode==='year'?ry===y:(ry===y&&rm===(m+1));};
  const inMenagePeriod=r=>{const d=r.dateDepart||r.dateArrivee||r.date;if(!d)return false;const[ry,rm]=d.split('-').map(Number);return viewMode==='year'?ry===y:(ry===y&&rm===(m+1));};
  const evs=D.reservations.filter(r=>r.status!=='annulé'&&inPeriod(r)&&r.prestaLines&&Object.values(r.prestaLines).some(l=>l.length>0));
  const byP={};let totalGeneral=0;
  evs.forEach(r=>Object.entries(r.prestaLines).forEach(([pid,lines])=>{
    lines.forEach(l=>{
      totalGeneral+=l.montant||0;
      if(!byP[pid])byP[pid]={total:0,count:0,direct:0,viaNous:0};
      byP[pid].total+=l.montant||0;
      byP[pid].count++;
      if(l.paidDirect)byP[pid].direct+=l.montant||0;else byP[pid].viaNous+=l.montant||0;
    });
  }));
  const rows=Object.entries(byP).sort((a,b)=>b[1].total-a[1].total);
  const revByDom={};let revTotal=0,paidTotal=0;
  const daysInPeriod=viewMode==='year'?(((y%4===0&&y%100!==0)||y%400===0)?366:365):new Date(y,m+1,0).getDate();
  D.reservations.filter(r=>r.status!=='annulé').forEach(r=>{
    const amt=viewMode==='year'?montantForYear(r,y):montantForMonth(r,y,m);
    const paid=viewMode==='year'?paidForYear(r,y):paidForMonth(r,y,m);
    if(!revByDom[r.domaine])revByDom[r.domaine]={loc:0,paid:0,cash:0,virement:0,nuitees:0};

      const[py,pm]=pa.date.split('-').map(Number);

  let cashTotal=0,virementTotal=0;

  const menageRows=Object.entries(menageByP);

  D.reservations.filter(r=>r.status!=='annulé').forEach(r=>{

      Object.entries(pg.nights||{}).forEach(([date,v])=>{

      });
    });
  });
  (D.gardeSchedule||[]).forEach(x=>{

function otherPrestaNames(r,excludeId){
  const names=new Set();
  (r.prestataires||[]).forEach(pid=>{if(pid!==excludeId){const pr=gPre(pid);if(pr.name)names.add(`${pr.name}${pr.role?' ('+pr.role+')':''}`);}});
  return Array.from(names);
}

  const inMonth=r=>{const d=r.dateArrivee||r.date;if(!d)return false;const[ry,rm]=d.split('-').map(Number);return ry===y&&rm===(m+1);};
  const inMenageMonth=r=>{const d=r.dateDepart||r.dateArrivee||r.date;if(!d)return false;const[ry,rm]=d.split('-').map(Number);return ry===y&&rm===(m+1);};

  let total=0,direct=0,aRecevoir=0;

  const menageTotal=menageEvs.reduce((a,x)=>a+x.mi.montant,0);

  return`<div class="cal-header" style="margin-bottom:14px">${monthYearPicker('prestaBilanYear','prestaBilanMonth')}</div>
  <div class="g3" style="margin-bottom:14px">
    <div class="metric"><span class="lbl">Mon total prestations</span><span class="val">${money(total)}</span></div>
    <div class="metric"><span class="lbl">Commission (10%)</span><span class="val" style="color:#27500A">${money(total*0.1)}</span></div>
    <div class="metric"><span class="lbl">Événements</span><span class="val">${rows.length}</span></div>
  </div>
  <div class="g2" style="margin-bottom:14px">
    <div class="metric"><span class="lbl">Déjà reçu directement</span><span class="val" style="color:#888">${money(direct)}</span></div>
    <div class="metric"><span class="lbl">Reste à recevoir de nous</span><span class="val" style="color:#A32D2D">${money(aRecevoir)}</span></div>
  </div>
  <div style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:14px">
    <div class="sec-hdr"><h2>🧹 Mon forfait ménage — sans commission</h2></div>
    <div class="g3" style="margin-bottom:10px">
      <div class="metric"><span class="lbl">Total dû</span><span class="val">${money(menageTotal)}</span></div>
      <div class="metric"><span class="lbl">Reçu</span><span class="val" style="color:#27500A">${money(menagePaid)}</span></div>
      <div class="metric"><span class="lbl">Reste à recevoir</span><span class="val" style="color:#A32D2D">${money(menageTotal-menagePaid)}</span></div>
    </div>
    ${menageEvs.length===0?'<div class="empty">Aucun forfait ménage ce mois-ci.</div>':''}
    ${menageEvs.map(({r,mi},mIdx)=>{const dom=gDom(r.domaine);return`<div style="padding:6px 8px;margin:0 -8px;border-bottom:1px solid #e5e3de;font-size:13px;background:${mIdx%2===1?'#f7f6f3':'transparent'}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span><span class="pill ${PILL[dom.color||0]}" style="margin-right:6px">${dom.name}</span>${ds(r.dateArrivee)}</span>
        <span><strong>${money(mi.montant)}</strong> <span style="color:${r.menagePaid?'#27500A':'#A32D2D'}">${r.menagePaid?'✓ reçu':'✗ à recevoir'}</span></span>
      </div>
      ${r.menageComment?`<div style="font-size:11px;color:#888;margin-top:2px">${r.menageComment}</div>`:''}
    </div>`;}).join('')}
  </div>
  <div style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem 1.25rem">
    <div class="sec-hdr"><h2>Mes prestations avec commission</h2></div>
    ${rows.length===0?'<div class="empty">Aucune prestation ce mois-ci.</div>':''}
    ${rows.map(({r,lines,sousTotal},rIdx)=>{const dom=gDom(r.domaine);return`<div style="padding:8px 8px;margin:0 -8px;border-bottom:1px solid #e5e3de;background:${rIdx%2===1?'#f7f6f3':'transparent'}">
      <div style="font-weight:500;font-size:13px">${r.client||dom.name}${r.typeClient==='entreprise'&&r.societe?` <span style="color:#888;font-weight:400">(${r.societe})</span>`:''} — <span class="pill ${PILL[dom.color||0]}">${dom.name}</span> · ${ds(r.dateArrivee)}</div>
      ${lines.map(l=>`<div style="font-size:12px;color:#666;margin-top:3px">${l.label||'—'} : <strong>${money(l.montant)}</strong> <span style="color:${l.paidDirect?'#888':'#A32D2D'}">(${l.paidDirect?'reçu directement':'à recevoir'})</span>${l.notes?' — '+l.notes:''}</div>`).join('')}
      <div style="font-size:12px;font-weight:600;margin-top:4px;color:#27500A">Sous-total : ${money(sousTotal)}</div>

function renderPrestaFull(p){
  const tab=S.prestaTab||'calendrier';

  if(p.inputMode==='notes')tabs.push(['monbilan','💰','Mon Bilan']);
  let content='';
  if(tab==='calendrier')content=renderCalendrier();

function setPrestaTab(t){S.prestaTab=t;S.selResa=null;S.modal=null;render();}

function renderGardePlanningCalendar(p){
  const y=S.calYear,m=S.calMonth,todayStr=dstr(new Date());
  const{tc,sd,dim,dip}=buildDateCellMap(y,m);
  const nightsByDate={};
  D.reservations.filter(r=>r.status!=='annulé').forEach(r=>{
    const pg=(r.prestaGarde||{})[p.id];if(!pg)return;
    Object.entries(pg.nights||{}).forEach(([date,v])=>{nightsByDate[date]={domaine:pg.domaine,duree:v.duree};});
  });
  (D.gardeSchedule||[]).filter(x=>x.pid===p.id).forEach(x=>{nightsByDate[x.date]={domaine:x.domaine,duree:x.duree};});
  let gridHtml=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let ci=0;ci<tc;ci++){
    let day,mo=m,yr=y,isO=false;
    if(ci<sd){day=dip-sd+ci+1;mo=m-1;if(mo<0){mo=11;yr=y-1;}isO=true;}
    else if(ci>=sd+dim){day=ci-sd-dim+1;mo=m+1;if(mo>11){mo=0;yr=y+1;}isO=true;}
    else day=ci-sd+1;
    const ds3=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const n=nightsByDate[ds3];
    let cls='cal-cell';if(isO)cls+=' other';if(ds3===todayStr)cls+=' today';
    const dom=n?gDom(n.domaine):null;
    const marker=n?`<div style="margin-top:6px;padding:4px 5px;border-radius:6px;background:${LEG_BG[dom.color||0]};font-size:10px;font-weight:700;text-align:center;line-height:1.3">${dom.name}<br>${n.duree==='courte'?'Courte':'Longue'}</div>`:'';
    gridHtml+=`<div class="${cls}"><div class="day-num-wrap"><span class="day-num">${day}</span></div>${marker}</div>`;
  }
  return`<div class="cal-header" style="margin-bottom:10px">${monthYearPicker('calYear','calMonth')}</div>
  <div class="leg">${D.domaines.map(d=>`<span class="leg-item"><span class="leg-dot" style="background:${LEG_BG[d.color||0]}"></span>${d.name}</span>`).join('')}</div>
  <div class="cal-grid">${gridHtml}</div>`;
}

function resizeImageFile(file,maxDim,callback){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg',0.72));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

  const domaine=document.getElementById('m-domaine').value,dateArrivee=document.getElementById('m-arr-date').value,heureArrivee=document.getElementById('m-arr-heure').value,dateDepart=document.getElementById('m-dep-date').value,heureDepart=document.getElementById('m-dep-heure').value,status=document.getElementById('m-status').value,client=capWords(document.getElementById('m-client').value.trim()),tel=document.getElementById('m-tel').value.trim(),email=document.getElementById('m-email').value.trim(),typeClient=document.getElementById('m-typeclient').value,societe=capWords(document.getElementById('m-societe').value.trim()),typeEvenement=(document.getElementById('m-evt')||{}).value||'',noteInterne=document.getElementById('m-noteI').value,montant=parseFloat(document.getElementById('m-montant').value)||0;
  const elAdultes=document.getElementById('m-adultes'),elEnfants=document.getElementById('m-enfants');
  let nbPersonnes,nbSoiree,nbAdultes=0,nbEnfants=0;
  if(domaine==='d3'&&elAdultes){
    nbAdultes=parseInt(elAdultes.value)||0;nbEnfants=parseInt((elEnfants&&elEnfants.value))||0;
    nbPersonnes=nbAdultes+nbEnfants;nbSoiree=nbPersonnes;
  } else {
    nbPersonnes=parseInt((document.getElementById('m-nbp')||{}).value)||0;
    nbSoiree=parseInt((document.getElementById('m-nbs')||{}).value)||0;
  }
  const cbs=document.querySelectorAll('#root input[type=checkbox]');const prestataires=Array.from(cbs).filter(c=>c.checked).map(c=>c.value);
  const origR=id?D.reservations.find(x=>x.id===id):null;
  const prestaGarde={};
  D.prestataires.forEach(p=>{
    if(!prestataires.includes(p.id))return;
    if(p.inputMode==='garde'){
      const domSel=document.getElementById('pgdom-'+p.id);
      const nights={};
      document.querySelectorAll(`.gard-chk[data-presta="${p.id}"]`).forEach(chk=>{
        if(chk.checked){
          const sel=document.querySelector(`.gard-sel[data-presta="${p.id}"][data-date="${chk.dataset.date}"]`);
          const duree=sel?sel.value:'longue';
          const prevNight=origR&&origR.prestaGarde&&origR.prestaGarde[p.id]&&origR.prestaGarde[p.id].nights&&origR.prestaGarde[p.id].nights[chk.dataset.date];
          nights[chk.dataset.date]={duree,paid:(prevNight&&prevNight.paid)||false,payMethod:(prevNight&&prevNight.payMethod)||'cash'};
        }
      });
      if(domSel&&Object.keys(nights).length)prestaGarde[p.id]={domaine:domSel.value,nights};
    }
  });
  const missing=[];
  if(!domaine)missing.push('le domaine');
  if(!dateArrivee)missing.push("la date d'arrivée");
  if(!dateDepart)missing.push('la date de départ');
  if(!heureArrivee)missing.push("l'heure d'arrivée");
  if(!heureDepart)missing.push("l'heure de départ");
  if(!client)missing.push('le nom du client');
  if(!tel)missing.push('le téléphone du client');
  if(typeClient==='entreprise'&&!societe)missing.push('le nom de la société');
  if(!typeEvenement)missing.push("le type d'événement");
  if(!nbPersonnes&&!nbSoiree)missing.push('au moins un nombre (couchages ou invités soirée)');
  if(!montant)missing.push('le montant');
  if(missing.length){alert('Champs obligatoires manquants : '+missing.join(', ')+'.');return;}
  if(!isValidPhone(tel)){alert("Numéro de téléphone invalide. En France : 10 chiffres commençant par 0 (ex. 06 12 34 56 78). À l'étranger : commencez par + ou 00 suivi de l'indicatif.");return;}
  const dep=dateDepart||dateArrivee;
  const isNew=!id;
  if(id){const r=D.reservations.find(x=>x.id===id);Object.assign(r,{domaine,dateArrivee,heureArrivee,dateDepart:dep,heureDepart,status,client,tel,email,typeClient,societe,typeEvenement,nbPersonnes,nbSoiree,nbAdultes,nbEnfants,prestaGarde,noteInterne,montant,prestataires});}
  else D.reservations.push({id:gid(),domaine,dateArrivee,heureArrivee,dateDepart:dep,heureDepart,status,client,tel,email,typeClient,societe,typeEvenement,nbPersonnes,nbSoiree,nbAdultes,nbEnfants,prestaLines:{},prestaGarde,noteInterne,montant,paiements:[],prestataires,commentaires:[]});
  logActivity(isNew?'créée':'modifiée',domaine,`Réservation ${isNew?'créée':'modifiée'} — ${(typeClient==='entreprise'&&societe)?societe:client||'—'} (${fmt(dateArrivee)})`);
  Object.keys(prestaGarde).forEach(pid=>{
    logActivity(isNew?'créée':'modifiée',domaine,`Gardiennage ${isNew?'ajouté':'mis à jour'} — ${(typeClient==='entreprise'&&societe)?societe:client||'—'} (${fmt(dateArrivee)})`,[pid]);
  });
  const[y,m]=dateArrivee.split('-');S.calYear=parseInt(y);S.calMonth=parseInt(m)-1;
  saveD();S.modal=null;S.tab='calendrier';showMsg('Réservation enregistrée ✓');
}

async function initApp(){
  const remote=await fetchRemoteD();
  if(remote)D=remote;
  runMigrations();
  saveD();
  if(!checkToken())render();else render();
  setInterval(async()=>{
    if(S.modal)return;
    const fresh=await fetchRemoteD();
    if(fresh&&JSON.stringify(fresh)!==JSON.stringify(D)){
      D=fresh;
      try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}
      render();
    }
  },8000);
}
let touchStartX=null,touchStartY=null;
document.addEventListener('touchstart',e=>{
  const grid=e.target.closest('.cal-grid');
  if(!grid){touchStartX=null;return;}
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(touchStartX===null)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  touchStartX=null;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0)navMonthOnly('calMonth','calYear',1);
    else navMonthOnly('calMonth','calYear',-1);
  }
},{passive:true});
initApp();
